name: Lichess Tactics Tracker

on:
  schedule:
    - cron: "0  * * * *"   # volle Stunde  → nur update-stats läuft
    - cron: "10 * * * *"   # +10 min       → nur detect-joins läuft
    - cron: "20 * * * *"   # +20 min
    - cron: "30 * * * *"   # +30 min
    - cron: "40 * * * *"   # +40 min
    - cron: "50 * * * *"   # +50 min
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Verhindert parallele Runs komplett — zweiter Run wartet bis erster fertig ist
concurrency:
  group: tactics-tracker
  cancel-in-progress: false

jobs:
  # ── Job 1: Stündliches Stats-Update ──────────────────────────────────────
  # Läuft NUR zur vollen Stunde (cron "0 * * * *") oder bei manuellem Trigger.
  # Bei den 10/20/30/40/50-Minuten-Crons wird er übersprungen.
  update-stats:
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.schedule == '0 * * * *'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests

      - name: Stats abrufen
        env:
          LICHESS_API_KEY: ${{ secrets.LICHESS_API_KEY }}
        run: python fetch_lichess_stats.py

      - name: Rangliste generieren
        run: python generate_leaderboard.py

      - name: Commit & Push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "chore: stats-update $(date -u +'%Y-%m-%dT%H:%M:%SZ')" || echo "Keine Änderungen"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            echo "Retry $i..."
            sleep $((i * 5))
          done

      - name: Workflow aktiv halten
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const wfs = await github.rest.actions.listRepoWorkflows({ owner, repo });
            for (const wf of wfs.data.workflows) {
              if (wf.state === 'disabled_inactivity') {
                await github.rest.actions.enableWorkflow({ owner, repo, workflow_id: wf.id });
                console.log(`Reaktiviert: ${wf.name}`);
              }
            }

  # ── Job 2: Join-Detection (alle 10 Minuten, NICHT zur vollen Stunde) ─────
  # Zur vollen Stunde übernimmt update-stats das Erfassen aller Spieler,
  # daher ist detect-joins dort überflüssig und würde nur Konflikte erzeugen.
  detect-joins:
    if: |
      github.event.schedule == '10 * * * *' ||
      github.event.schedule == '20 * * * *' ||
      github.event.schedule == '30 * * * *' ||
      github.event.schedule == '40 * * * *' ||
      github.event.schedule == '50 * * * *'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests

      - name: Neue Mitglieder erkennen & Baseline speichern
        env:
          LICHESS_API_KEY: ${{ secrets.LICHESS_API_KEY }}
        run: python detect_new_members.py

      - name: Rangliste aktualisieren
        run: python generate_leaderboard.py

      - name: Commit & Push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "chore: join-detection $(date -u +'%Y-%m-%dT%H:%M:%SZ')" || echo "Keine neuen Mitglieder"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            echo "Retry $i..."
            sleep $((i * 5))
          done
